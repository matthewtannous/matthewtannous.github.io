---
layout: default
---

<h1 class="page-title">
    {{ page.title }}
</h1>

<!-- <h2>{{ page.short_description }}</h2> -->

<div class="project-details-container">
    <section class="project-full-description">{{ content }}</section>

    <div class="video-demo-container">
        {% if page.video_id == 'nil' %}
        <h3>Video demo coming soon!</h3>

        {% else %}
        <h3>Video demo:</h3>

        <iframe src="https://www.youtube.com/embed/{{ page.video_id }}" title="YouTube video player" frameborder="0"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
            allowfullscreen></iframe>
        {% endif %}
    </div>

    <div class="source-code-link">
        <a href="{{ page.link }}">Source code</a>
    </div>
</div>
